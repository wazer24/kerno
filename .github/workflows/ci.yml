name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v2.4"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install BPF toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev linux-headers-generic

      - name: Generate BPF bindings
        run: go generate ./internal/bpf/...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

      - name: go vet
        run: go vet ./...

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  # ── Unit Tests ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install covdata tool
        run: go install golang.org/x/tools/cmd/covdata@latest || true

      - name: Install BPF toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev linux-headers-generic

      - name: Generate BPF bindings
        run: go generate ./internal/bpf/...

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version detection.

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install BPF toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev linux-headers-generic

      - name: Generate BPF bindings
        run: go generate ./internal/bpf/...

      - name: Build binary
        run: make build

      - name: Verify binary
        run: ./bin/kerno version

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kerno-linux-amd64
          path: bin/kerno
          retention-days: 7

  # ── BPF Compile Check ────────────────────────────────────────────────────
  bpf:
    name: BPF Compile
    runs-on: ubuntu-22.04
    # Only run when BPF source files change.
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'bpf')
    steps:
      - uses: actions/checkout@v4

      - name: Install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libbpf-dev \
            linux-headers-$(uname -r)

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # This will fail gracefully until Phase 1 adds BPF sources.
      - name: Compile BPF programs
        run: |
          if ls internal/bpf/c/*.c 1>/dev/null 2>&1; then
            make bpf
          else
            echo "No BPF sources yet — skipping"
          fi

  # ── Docker Build (no push) ───────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/optiqor/kerno:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
