# v0.2 release: 20 diagnostic rules.
# 6 eBPF programs + 7 userspace pollers (procfs/sysfs/cgroupfs).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kerno
  namespace: kerno-system
  labels:
    app.kubernetes.io/name: kerno
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kerno
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kerno
        app.kubernetes.io/component: agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kerno
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      containers:
        - name: kerno
          image: ghcr.io/lowplane/kerno:latest
          args: ["start"]
          securityContext:
            privileged: true
          ports:
            - name: metrics
              containerPort: 9090
              hostPort: 9090
              protocol: TCP
          env:
            - name: KERNO_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: KERNO_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KERNO_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KERNO_LOG_FORMAT
              value: "json"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            # ── eBPF core (6 programs: syscall, tcp, oom, disk, sched, fd) ──
            - name: sys-kernel-debug
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: sys-kernel-btf
              mountPath: /sys/kernel/btf
              readOnly: true
            - name: sys-fs-bpf
              mountPath: /sys/fs/bpf
            # ── procfs (memory, conntrack, cpu stats, network stats) ─────────
            - name: proc
              mountPath: /host/proc
              readOnly: true
            # ── cgroupfs (cpu_throttled, memory_limit_pressure) ──────────────
            - name: sys-fs-cgroup
              mountPath: /host/sys/fs/cgroup
              readOnly: true
            # ── NIC stats (nic_errors) ───────────────────────────────────────
            - name: sys-class-net
              mountPath: /host/sys/class/net
              readOnly: true
            # ── Disk device stats (disk_space_critical) ──────────────────────
            - name: sys-block
              mountPath: /host/sys/block
              readOnly: true
      volumes:
        - name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
            type: Directory
        - name: sys-kernel-btf
          hostPath:
            path: /sys/kernel/btf
            type: Directory
        - name: sys-fs-bpf
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: proc
          hostPath:
            path: /proc
            type: Directory
        - name: sys-fs-cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: sys-class-net
          hostPath:
            path: /sys/class/net
            type: Directory
        - name: sys-block
          hostPath:
            path: /sys/block
            type: Directory
